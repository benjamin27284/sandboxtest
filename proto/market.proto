// Shared Protobuf definitions for cross-service message serialization.
// Used by: Kafka message payloads, C++ LOB ↔ Python orchestrator,
//          WebSocket gateway → frontend.
//
// Codegen:
//   C++:    protoc --cpp_out=. proto/market.proto
//   Python: protoc --python_out=. --pyi_out=. proto/market.proto

syntax = "proto3";
package abms.market;

option cc_enable_arenas = true;

// ─── Enums ─────────────────────────────────────────────────────────────────

enum Side {
    SIDE_UNSPECIFIED = 0;
    BUY             = 1;
    SELL            = 2;
}

enum OrderType {
    ORDER_TYPE_UNSPECIFIED = 0;
    LIMIT                 = 1;
    MARKET                = 2;
}

// ─── Orders ────────────────────────────────────────────────────────────────

message Order {
    string    order_id  = 1;
    string    agent_id  = 2;
    Side      side      = 3;
    OrderType type      = 4;
    double    price     = 5;  // ignored for MARKET orders
    int32     quantity  = 6;
    int64     timestamp = 7;
}

message CancelOrder {
    string order_id = 1;
    string agent_id = 2;
    int64  tick     = 3;
}

// ─── Executions ────────────────────────────────────────────────────────────
// One Execution per matched fill.  Both sides are identified so downstream
// consumers (orchestrator, dashboard) can route fills without a second lookup.

message Execution {
    string exec_id          = 1;
    string order_id         = 2;  // aggressor order
    string agent_id         = 3;  // aggressor agent
    double fill_price       = 4;
    int32  fill_qty         = 5;
    int64  timestamp        = 6;
    string counter_order_id = 7;  // passive (resting) order
    string counter_agent_id = 8;  // passive (resting) agent
    Side   aggressor_side   = 9;  // BUY or SELL — determines buyer/seller
}

// ─── Market Data ───────────────────────────────────────────────────────────

message PriceLevel {
    double price    = 1;
    int64  quantity = 2;
    int32  count    = 3;  // number of orders at this level
}

message OrderBookSnapshot {
    int64               tick         = 1;
    double              mid_price    = 2;
    double              best_bid     = 3;
    double              best_ask     = 4;
    double              spread       = 5;
    repeated PriceLevel bids         = 6;
    repeated PriceLevel asks         = 7;
    int64               timestamp_ns = 8;
}

// MarketSnapshot is the periodic snapshot published to Kafka market_data topic.
// Contains the full order book state for downstream consumers.
message MarketSnapshot {
    double            mid_price      = 1;
    double            spread         = 2;
    int32             total_volume   = 3;
    OrderBookSnapshot book_snapshot  = 4;
}

message TickSummary {
    int64             tick          = 1;
    double            open_price    = 2;
    double            close_price   = 3;
    double            high_price    = 4;
    double            low_price     = 5;
    int64             volume        = 6;
    int32             num_trades    = 7;
    OrderBookSnapshot book_snapshot = 8;
    // MASS consensus signal from the orchestrator
    double            consensus     = 9;
    double            disagreement  = 10;
    double            mass_signal   = 11;
}

// ─── Event Injection ───────────────────────────────────────────────────────

message NewsEvent {
    string headline       = 1;
    double severity_score = 2;
}

message ExogenousShock {
    string shock_id     = 1;
    int64  tick         = 2;
    string category     = 3;  // "monetary_policy", "geopolitical", "earnings", ...
    string headline     = 4;
    string body         = 5;
    double severity     = 6;  // 0.0 (trivial) to 1.0 (black swan)
    int64  timestamp_ns = 7;
}
