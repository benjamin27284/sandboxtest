# =============================================================================
# ABMS Platform — Docker Compose
# =============================================================================
# Spins up the full distributed stack:
#   - Kafka (event bus) + Zookeeper
#   - Redis (agent state store)
#   - Qdrant (vector DB for semantic memory / RAG)
#   - LOB Engine (C++ matching engine)
#   - Agent Orchestrator (Ray-based Python actors)
#   - API Gateway (FastAPI WebSocket bridge)
#   - Frontend (Next.js dashboard)
# =============================================================================

services:

  # ─── Infrastructure ───────────────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=ruok,srvr,stat"
    ports:
      - "2181:2181"
    volumes:
      - zk-data:/var/lib/zookeeper/data
    healthcheck:
      test: echo ruok | nc localhost 2181 | grep imok
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 8
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_MESSAGE_MAX_BYTES: 1048576
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: kafka-broker-api-versions --bootstrap-server localhost:29092
      interval: 15s
      timeout: 10s
      retries: 10

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: redis-cli ping | grep PONG
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.9.0
    ports:
      - "6333:6333"   # REST
      - "6334:6334"   # gRPC
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Topic Initializer ───────────────────────────────────────────────────

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "Creating Kafka topics..."
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
          --topic orders_submit    --partitions 8 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
          --topic orders_cancel    --partitions 4 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
          --topic executions       --partitions 8 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
          --topic market_data      --partitions 4 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
          --topic tick_summary     --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
          --topic exogenous_shocks --partitions 1 --replication-factor 1
        echo "Topics created."

  # ─── LOB Matching Engine (C++) ───────────────────────────────────────────

  lob-engine:
    build:
      context: ./services/lob-engine
      dockerfile: Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: kafka:29092
      ORDERS_TOPIC: orders_submit
      CANCEL_TOPIC: orders_cancel
      EXECUTIONS_TOPIC: executions
      MARKET_DATA_TOPIC: market_data
      TICK_SUMMARY_TOPIC: tick_summary
      LOG_LEVEL: info
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 2G
    restart: unless-stopped

  # ─── Agent Orchestrator (Python / Ray) ───────────────────────────────────

  agent-orchestrator:
    build:
      context: ./services/agent-orchestrator
      dockerfile: Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: kafka:29092
      REDIS_URL: redis://redis:6379/0
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6334
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      DASHSCOPE_BASE_URL: ${DASHSCOPE_BASE_URL}
      RAY_NUM_CPUS: 4
      NUM_AGENTS: 10
      PRIMARY_LLM_MODEL: qwen-turbo
      TICKS_PER_SUMMARY: 10
      LLM_TIMEOUT_SECONDS: 15
      LOG_LEVEL: info
    volumes:
      - ray-tmp:/tmp/ray
    shm_size: "4gb"
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G
    restart: unless-stopped

  # ─── API Gateway (FastAPI + WebSocket) ───────────────────────────────────

  api-gateway:
    build:
      context: ./services
      dockerfile: api-gateway/Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      KAFKA_BROKERS: kafka:29092
      REDIS_URL: redis://redis:6379/0
      WS_MAX_CONNECTIONS: 200
      CORS_ORIGINS: http://localhost:3000
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      DASHSCOPE_BASE_URL: ${DASHSCOPE_BASE_URL}
      PRIMARY_LLM_MODEL: qwen-plus
    restart: unless-stopped

  # ─── Frontend (Next.js) ──────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_WS_URL: ws://localhost:8000/ws/market
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api-gateway

# ─── Volumes ──────────────────────────────────────────────────────────────

volumes:
  zk-data:
  kafka-data:
  redis-data:
  qdrant-data:
  ray-tmp:
